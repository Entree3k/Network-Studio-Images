name: Build and Release Plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number, for example 1.0.0.1'
        required: true
        default: '1.0.0.0'

env:
  ARTIFACT_NAME: network-images-${{ inputs.version }}.zip
  DESCRIPTION: Provides network and studio images from a configurable GitHub repository. Matches studios by TMDB provider ID first, then falls back to name matching.
  FRAMEWORK: net9.0
  OVERVIEW: Download network/studio artwork from a custom repository
  OWNER: Entree3k
  PLUGIN_GUID: a1b2c3d4-e5f6-7890-abcd-ef1234567890
  PLUGIN_NAME: Network Images
  RELEASE_DIR: artifacts/release
  TARGET_ABI: 10.11.0.0
  VERSION: ${{ inputs.version }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Validate version
        run: |
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use four numeric parts, for example 1.0.0.1"
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Update build metadata
        run: |
          python scripts/update-release-metadata.py --version "${VERSION}" --metadata-only

      - name: Build
        run: dotnet build Jellyfin.Plugin.NetworkImages.sln -c Release

      - name: Create release zip
        run: |
          mkdir -p "${RELEASE_DIR}"
          zip -j "${RELEASE_DIR}/${ARTIFACT_NAME}" "Jellyfin.Plugin.NetworkImages/bin/Release/${FRAMEWORK}/Jellyfin.Plugin.NetworkImages.dll"

      - name: Get checksum
        id: checksum
        run: |
          CHECKSUM=$(md5sum "${RELEASE_DIR}/${ARTIFACT_NAME}" | awk '{print toupper($1)}')
          echo "md5=${CHECKSUM}" >> "${GITHUB_OUTPUT}"
          echo "Checksum: ${CHECKSUM}"

      - name: Update manifest
        env:
          CHECKSUM: ${{ steps.checksum.outputs.md5 }}
        run: |
          python scripts/update-release-metadata.py --version "${VERSION}" --checksum "${CHECKSUM}"

      - name: Commit release metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Directory.Build.props build.yaml manifest.json
          git diff --staged --quiet && echo "No release metadata changes to commit" || git commit -m "Release v${VERSION}"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Network Images v${{ inputs.version }}
          target_commitish: ${{ github.ref_name }}
          files: artifacts/release/network-images-${{ inputs.version }}.zip
          body: Release v${{ inputs.version }}
          generate_release_notes: true
