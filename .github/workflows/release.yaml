name: '🚀 Build and Release Plugin'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0.0)'
        required: true
        default: '1.0.0.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build
        run: dotnet build Jellyfin.Plugin.NetworkImages.sln -c Release

      - name: Create zip
        run: |
          cd Jellyfin.Plugin.NetworkImages/bin/Release/net9.0
          zip network-images-${{ github.event.inputs.version }}.zip Jellyfin.Plugin.NetworkImages.dll

      - name: Get checksum
        id: checksum
        run: |
          CHECKSUM=$(md5sum Jellyfin.Plugin.NetworkImages/bin/Release/net9.0/network-images-${{ github.event.inputs.version }}.zip | awk '{print toupper($1)}')
          echo "md5=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "Checksum: $CHECKSUM"

      - name: Update manifest.json
        run: |
          CHECKSUM="${{ steps.checksum.outputs.md5 }}"
          VERSION="${{ github.event.inputs.version }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > manifest.json << EOF
          [
            {
              "guid": "a1b2c3d4-e5f6-7890-abcd-ef1234567890",
              "name": "Network Images",
              "description": "Provides network and studio images from a configurable GitHub repository. Matches studios by TMDB provider ID first, then falls back to name matching.",
              "overview": "Download network/studio artwork from a custom repository",
              "owner": "Entree3k",
              "category": "Metadata",
              "imageUrl": "https://raw.githubusercontent.com/Entree3k/Network-Studio-Images/refs/heads/main/Assets/logo.png",
              "versions": [
                {
                  "version": "${VERSION}",
                  "changelog": "Release v${VERSION}",
                  "targetAbi": "10.9.0.0",
                  "sourceUrl": "https://github.com/Entree3k/Network-Studio-Images/releases/download/v${VERSION}/network-images-${VERSION}.zip",
                  "checksum": "${CHECKSUM}",
                  "timestamp": "${TIMESTAMP}"
                }
              ]
            }
          ]
          EOF

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Update manifest for v${{ github.event.inputs.version }}" || echo "No changes to commit"
          git push

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Network Images v${{ github.event.inputs.version }}
          files: Jellyfin.Plugin.NetworkImages/bin/Release/net9.0/network-images-${{ github.event.inputs.version }}.zip
          generate_release_notes: true
